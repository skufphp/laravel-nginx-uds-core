services:
  # Основной контейнер Laravel PHP-FPM
  laravel-php-nginx-uds-core:
    build:
      context: .
      dockerfile: docker/php.Dockerfile
      target: development
      args:
        INSTALL_XDEBUG: "true"
    image: laravel-php-nginx-uds-core:dev
    pull_policy: never
    container_name: laravel-php-nginx-uds-core
    restart: unless-stopped
    working_dir: /var/www/laravel
    volumes:
      - unix-socket:/var/run/php
      - .:/var/www/laravel
    environment:
      APP_BASE_PATH: ${APP_BASE_PATH:-/var/www/laravel}
      XDEBUG_MODE: ${XDEBUG_MODE}
      XDEBUG_START: ${XDEBUG_START}
      XDEBUG_CLIENT_HOST: ${XDEBUG_CLIENT_HOST}
    networks:
      - laravel-nginx-uds-core-network
      - postgres-dev-network
      - mysql-dev-network
      - redis
    healthcheck:
      # Проверка доступности FPM через сокет
      test:
        [
          "CMD-SHELL",
          "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect /var/run/php/php-fpm.sock | grep -q 'pong'"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Веб-сервер Nginx (Proxy)
  laravel-nginx-uds-core:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
      target: development
    image: laravel-nginx-uds-core:dev
    pull_policy: never
    container_name: laravel-nginx-uds-core
    restart: unless-stopped
    volumes:
      - unix-socket:/var/run/php
      - .:/var/www/laravel
    ports:
      - "${NGINX_PORT:-8050}:80"
    networks:
      - laravel-nginx-uds-core-network
    depends_on:
      laravel-php-nginx-uds-core:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost/ > /dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Node.js для сборки фронтенда и Hot Module Replacement (HMR)
  laravel-node-nginx-uds-core:
    image: node:24-alpine
    container_name: laravel-node-nginx-uds-core
    restart: unless-stopped
    working_dir: /var/www/laravel
    volumes:
      - .:/var/www/laravel
      - node_modules:/var/www/laravel/node_modules
    command: >
      sh -lc '
        # Установка зависимостей, если они отсутствуют
        if [ -f package-lock.json ]; then
          npm ci;
        else
          npm install;
        fi;

        # Запуск Vite в режиме разработки
        npm run dev -- --host 0.0.0.0 --port 5173
      '
    ports:
      - "5173:5173"
    networks:
      - laravel-nginx-uds-core-network

  # Laravel Queue Worker — обработка фоновых задач
  laravel-queue-nginx-uds-core:
    image: laravel-php-nginx-uds-core:dev
    container_name: laravel-queue-nginx-uds-core
    pull_policy: never
    restart: unless-stopped
    working_dir: /var/www/laravel
    volumes:
      - .:/var/www/laravel
    command: [ "php", "artisan", "queue:work", "--sleep=1", "--tries=1" ]
    networks:
      - laravel-nginx-uds-core-network
      - postgres-dev-network
      - mysql-dev-network
      - redis
    depends_on:
      laravel-php-nginx-uds-core:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "ps aux | grep -v grep | grep 'queue:work' >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Laravel Scheduler — запуск периодических задач (cron)
  laravel-scheduler-nginx-uds-core:
    image: laravel-php-nginx-uds-core:dev
    container_name: laravel-scheduler-nginx-uds-core
    pull_policy: never
    restart: unless-stopped
    working_dir: /var/www/laravel
    volumes:
      - .:/var/www/laravel
    command: [ "php", "artisan", "schedule:work" ]
    networks:
      - laravel-nginx-uds-core-network
      - postgres-dev-network
      - mysql-dev-network
      - redis
    depends_on:
      laravel-php-nginx-uds-core:
        condition: service_healthy

volumes:
  unix-socket:
  node_modules:

networks:
  laravel-nginx-uds-core-network:
    driver: bridge

  redis:
    external: true

  postgres-dev-network:
    external: true

  mysql-dev-network:
    external: true
